<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#f97316" />

    <!-- PWA / App-like -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="สั่งอาหาร" />

    <!-- SEO / Share -->
    <meta name="description" content="สแกน QR เพื่อสั่งอาหาร ไม่ต้องติดตั้งแอป" />
    <meta property="og:title" content="ร้านอาหารไทยสุขใจ — สั่งอาหารออนไลน์" />
    <meta property="og:description" content="สแกน QR เพื่อดูเมนูและสั่งอาหาร" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ร้านอาหารไทยสุขใจ</title>

    <!-- GitHub Pages SPA routing fix: รับ redirect จาก 404.html -->
    <script>
      (function(){
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          var h    = window.location.search.match(/[?&]h=([^&]+)/);
          window.history.replaceState(
            null, null,
            path + (h ? decodeURIComponent(h[1]) : "")
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
