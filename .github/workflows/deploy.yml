# .github/workflows/deploy.yml
# ============================================================
# Auto Deploy to GitHub Pages
# ทุกครั้งที่ push ไปที่ branch "main" จะ build + deploy อัตโนมัติ
# ============================================================

name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # กด deploy manually ได้จาก GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout code
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # 4. สร้างไฟล์ .env จาก GitHub Secrets
      #    (Firebase config ปลอดภัย ไม่ถูก commit)
      - name: 🔑 Create .env from Secrets
        run: |
          cat > .env << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          EOF

      # 5. Build
      - name: 🔨 Build
        run: npm run build

      # 6. Upload build output
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. Deploy to GitHub Pages
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
